<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

<!-- ========================================================================================================= -->

  <!-- 1. GLOBAL RENDERING SETTINGS: Controls how fonts look on your screen -->
        <match target="font">
          <edit name="antialias"      mode="assign"> <bool>true</bool>         </edit>
          <edit name="hinting"        mode="assign"> <bool>true</bool>        </edit>
          <edit name="hintstyle"      mode="assign"> <const>hintfull</const>   </edit>
          <edit name="rgba"           mode="assign"> <const>rgb</const>        </edit>
          <edit name="lcdfilter"      mode="assign"> <const>lcddefault</const> </edit>
        </match>

  
  <!-- 2. Disable Bitmap Globally but enable for Noto Color Emoji -->
  <!--  <match target="font"> 
          <edit name="embeddedbitmap" mode="assign"><bool>false</bool>      </edit>
          <test name="family" qual="any"><string>Noto Color Emoji</string>  </test>
          <edit name="embeddedbitmap" mode="assign"><bool>true</bool>       </edit>
        </match> -->

<!-- ========================================================================================================= -->

  <!-- 3. Set Default/Fallback Fonts -->

<!--  there are only three genric fonts (serif sans-serif monospace) for example : look at firefox font config    -->
<!-- <alias> tag is used to map generic system names (like serif) to specific installed fonts (like Noto Serif)   -->
<!-- <prefer> tag ensures that if the specified font is "INSTALLED", it will be the first choice for that categor -->

  <!-- Default serif font -->
  <alias>
    <family>serif</family>
    <prefer>
        <family>Noto Serif</family>        <!-- first priority -->
        <family>Noto Color Emoji</family>  <!-- second priority  -->
    </prefer>
  </alias>

  <!-- Default sans-serif font -->
  <alias>
    <family>sans-serif</family>
    <prefer>
        <family>Noto Sans</family>         <!-- first priority -->
        <family>Noto Color Emoji</family>  <!-- second priority  -->
    </prefer>
  </alias>

  <!-- Default monospace font -->
  <alias>
    <family>monospace</family>
    <prefer>
        <family>Iosevka Nerd Font</family> <!-- first priority  -->
        <family>Noto Color Emoji</family>  <!-- second priority  -->
    </prefer>
  </alias>

<!-- ========================================================================================================= -->

